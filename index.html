<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Highpoints</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗼</text></svg>">
    <style>
        :root { --bg: #0a0a0a; --footer-bg: rgba(10,10,10,0.95); --text-white:#fff; --text-dim:#888; }
        body,html { margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
        iframe.map-frame { width:100%;height:100%;border:none;display:block; }
        .content-overlay { position:fixed;top:0;left:0;width:100%;height:calc(100% - 55px);background:var(--bg);z-index:50;display:none;overflow-y:auto;padding:60px 20px;box-sizing:border-box; }
        .content-overlay.active { display:block; }
        .container { max-width:650px;margin:0 auto;padding-bottom:50px; }
        h1 { color:var(--text-white);font-size:26px;margin-top:0;margin-bottom:20px;font-weight:600; }
        .description-text { color:var(--text-dim);font-size:16px;line-height:1.6; }
        strong { color:#eee; }
        .map-footer { position:fixed;bottom:0;width:100%;height:55px;background:var(--footer-bg);border-top:1px solid #222;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;z-index:100; }
        .footer-item { text-align:center;color:var(--text-dim);font-size:13px; }
        .nav-btn { color:#eee;text-decoration:none;cursor:pointer;padding:10px;font-weight:500; }
        .nav-btn:hover { color:var(--text-white); }
        .active-btn { color:#3498db !important; }

        /* Search */
        #search-box { display:flex;gap:10px;margin-bottom:20px; }
        #search-input { flex:1;background:#111;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:6px;font-size:15px;outline:none; }
        #search-input:focus { border-color:#555; }
        #sort-select { background:#111;border:1px solid #333;color:#888;padding:10px 10px;border-radius:6px;font-size:13px;outline:none;cursor:pointer; }
        #results-info { color:var(--text-dim);font-size:13px;margin-bottom:12px; }
        .result-card { background:#111;border:1px solid #222;border-radius:8px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s; }
        .result-card:hover { border-color:#444; }
        .result-name { color:#fff;font-size:15px;font-weight:500; }
        .result-meta { color:#666;font-size:12px;margin-top:4px; }
        .result-height { color:#3498db;font-weight:600; }
        #no-results { color:var(--text-dim);font-size:14px;display:none; }
    </style>
</head>
<body>

    <iframe class="map-frame" id="map-iframe" allowfullscreen allow="geolocation"
        src="https://umap.openstreetmap.fr/en/map/masts-chimneys-turbines-etc-2026_1398843?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=caption&captionBar=false&captionMenus=true">
    </iframe>

    <div id="about-page" class="content-overlay">
        <div class="container">
            <h1>🗼 Highpoints</h1>
            <p class="description-text">
                highpoints is a map of urban climbing spots such as masts, chimneys, wind turbines, pylons, etc.
                <br><br>
                it's a free non-profit side project. the map currently tracks over <strong>1,100,000 structures</strong>.
                <br><br>
                you can contact me on instagram - kierpv.
            </p>
        </div>
    </div>

    <div id="search-page" class="content-overlay">
        <div class="container">
            <h1>🔍 Search</h1>
            <div id="search-box">
                <input id="search-input" type="text" placeholder="e.g. maszt, chimney, ANDELKA…" oninput="doSearch()">
                <select id="sort-select" onchange="doSearch()">
                    <option value="name">name A–Z</option>
                    <option value="height_desc">height ↓</option>
                    <option value="height_asc">height ↑</option>
                </select>
            </div>
            <div id="results-info"></div>
            <div id="results-list"></div>
            <div id="no-results">no results found.</div>
        </div>
    </div>

    <div class="map-footer">
        <div class="footer-item">views: <span id="gc-vc">...</span></div>
        <div class="footer-item"><span class="nav-btn" id="btn-about" onclick="showPage('about')">about</span></div>
        <div class="footer-item"><span class="nav-btn" id="btn-search" onclick="showPage('search')">search</span></div>
    </div>

    <script data-goatcounter="https://kierpv.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <script>
        fetch('https://kierpv.goatcounter.com/counter/TOTAL.json')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(d => document.getElementById('gc-vc').textContent = d.count.replace(/[^0-9]/g,''))
            .catch(() => document.getElementById('gc-vc').textContent = '8+');

        function showPage(id) {
            ['about','search'].forEach(p => {
                const el = document.getElementById(p+'-page');
                const btn = document.getElementById('btn-'+p);
                const active = p === id && !el.classList.contains('active');
                el.classList.toggle('active', active);
                btn.classList.toggle('active-btn', active);
            });
        }

        // Search
        let allFeatures = [];

        async function loadData() {
            const r = await fetch('/map.umap');
            const d = await r.json();
            allFeatures = d.layers.flatMap(l => l.features || []);
        }
        loadData();

        function doSearch() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            const sort = document.getElementById('sort-select').value;
            const list = document.getElementById('results-list');
            const info = document.getElementById('results-info');
            const none = document.getElementById('no-results');

            if (!q) { list.innerHTML=''; info.textContent=''; none.style.display='none'; return; }

            let res = allFeatures.filter(f => (f.properties.name||'').toLowerCase().includes(q));

            if (sort === 'height_desc') res.sort((a,b) => (b.properties.height_m||0)-(a.properties.height_m||0));
            else if (sort === 'height_asc') res.sort((a,b) => (a.properties.height_m||0)-(b.properties.height_m||0));
            else res.sort((a,b) => (a.properties.name||'').localeCompare(b.properties.name||''));

            info.textContent = res.length ? `${res.length} result${res.length>1?'s':''}` : '';
            none.style.display = res.length ? 'none' : 'block';

            list.innerHTML = res.map(f => {
                const p = f.properties;
                const [lng, lat] = f.geometry.coordinates;
                return `<div class="result-card" onclick="goTo(${lat},${lng})">
                    <div class="result-name">${p.name || '—'}</div>
                    <div class="result-meta">
                        ${p.type ? p.type + ' &nbsp;·&nbsp; ' : ''}
                        ${p.height_m ? '<span class="result-height">'+p.height_m+' m</span>' : 'height unknown'}
                        &nbsp;·&nbsp; ${lat.toFixed(4)}, ${lng.toFixed(4)}
                    </div>
                </div>`;
            }).join('');
        }

        function goTo(lat, lng) {
            const zoom = 15;
            const iframe = document.getElementById('map-iframe');
            iframe.src = `https://umap.openstreetmap.fr/en/map/masts-chimneys-turbines-etc-2026_1398843?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&editMode=disabled&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true#${zoom}/${lat}/${lng}`;
            showPage('search'); // close search, show map
        }
    </script>
</body>
</html>
