<script>

fetch('https://kierpv.goatcounter.com/counter/TOTAL.json')
.then(r => r.ok ? r.json() : Promise.reject())
.then(d => document.getElementById('gc-vc').textContent = d.count.replace(/[^0-9]/g,''))
.catch(() => document.getElementById('gc-vc').textContent = '8+');

const PAGES = ['about','comments','data'];

function showPage(id) {

    const targetPage = document.getElementById(id + '-page');
    const targetBtn = document.getElementById('btn-' + id);

    const isShowing = targetPage.classList.contains('active');

    PAGES.forEach(p => {

        document.getElementById(p + '-page').classList.remove('active');

        const b = document.getElementById('btn-' + p);

        if (b) b.classList.remove('active-btn');
    });

    if (!isShowing) {

        targetPage.classList.add('active');

        if (targetBtn)
            targetBtn.classList.add('active-btn');
    }
}

let allData = [];
let filtered = [];

let sortCol = 'h';
let sortDir = -1;

let currentPage = 1;

const PAGE_SIZE = 250;

let loadedRegion = null;
let loading = false;

const tableWrap = document.getElementById('table-wrap');
const metaText = document.getElementById('meta-text');
const controlsBar = document.getElementById('controls-bar');
const pagination = document.getElementById('pagination');

const filterInput = document.getElementById('filter-input');
const typeFilter = document.getElementById('type-filter');
const subregionFilter = document.getElementById('subregion-filter');

const hideLinesCheck =
    document.getElementById('hide-lines-check');

const hideUnknownCheck =
    document.getElementById('hide-unknown-check');

document.querySelectorAll('.country-btn').forEach(btn => {

    btn.addEventListener('click', () => {

        document.querySelectorAll('.country-btn')
            .forEach(b => b.classList.remove('active'));

        btn.classList.add('active');

        loadRegion(btn.dataset.region);
    });
});

async function loadRegion(region) {

    if (loading || loadedRegion === region)
        return;

    loading = true;

    loadedRegion = region;

    allData = [];
    filtered = [];

    currentPage = 1;

    controlsBar.style.display = 'none';
    pagination.style.display = 'none';

    tableWrap.innerHTML = `
        <div class="state-box">
            Loading ${region.toUpperCase()} data...
        </div>
    `;

    try {

        let files = [];

        if (region === 'europe') {

            files = [
                'europe-1.json'
            ];

        } else {

            files = [
                `data-${region}.json`
            ];
        }

        const responses = await Promise.all(
            files.map(f =>
                fetch(f + `?t=${Date.now()}`)
            )
        );

        for (const r of responses) {

            if (!r.ok)
                throw new Error(`HTTP ${r.status}`);
        }

        const arrays = await Promise.all(
            responses.map(r => r.json())
        );

        let data = arrays.flat();

        data.forEach(d => {

            d.n = d.n || d.name || '—';

            d.t = (
                d.t ||
                d.type ||
                'OTHER'
            )
            .toString()
            .trim()
            .toUpperCase();

            d.h =
                d.h != null
                ? parseFloat(d.h)
                : null;

            d.state =
                region === 'europe'
                ? (d.country || 'Unknown')
                : (d.state || 'Unknown');

            d.city = d.city || '—';
        });

        allData = data.filter(d => {

            if (d.t === 'TRANSMISSION_LINE')
                return false;

            return true;
        });

        populateFilters();

        loading = false;

        controlsBar.style.display = 'flex';

        applyFilters();

    } catch (err) {

        loading = false;

        console.error(err);

        tableWrap.innerHTML = `
            <div class="state-box">
                Failed to load data.
                <br><br>
                ${err.message}
            </div>
        `;
    }
}

function populateFilters() {

    const types = [
        ...new Set(
            allData.map(d => d.t).filter(Boolean)
        )
    ].sort();

    const states = [
        ...new Set(
            allData.map(d => d.state).filter(Boolean)
        )
    ].sort();

    typeFilter.innerHTML =
        '<option value=\"\">all types</option>';

    types.forEach(t => {

        typeFilter.innerHTML += `
            <option value="${esc(t)}">
                ${esc(t)}
            </option>
        `;
    });

    subregionFilter.innerHTML =
        '<option value=\"\">all</option>';

    states.forEach(s => {

        subregionFilter.innerHTML += `
            <option value="${esc(s)}">
                ${esc(s)}
            </option>
        `;
    });
}

function applyFilters() {

    const q =
        filterInput.value.trim().toLowerCase();

    const t =
        typeFilter.value.toUpperCase();

    const sub =
        subregionFilter.value;

    const hideLines =
        hideLinesCheck.checked;

    const hideUnknown =
        hideUnknownCheck.checked;

    filtered = allData.filter(d => {

        const nameMatch =
            !q ||
            (d.n || '')
                .toLowerCase()
                .includes(q) ||
            (d.city || '')
                .toLowerCase()
                .includes(q);

        const typeMatch =
            !t ||
            d.t === t;

        const subMatch =
            !sub ||
            d.state === sub;

        if (
            hideLines &&
            (
                d.t === 'TRANSMISSION_LINE' ||
                d.t === 'POLE'
            )
        ) {
            return false;
        }

        if (
            hideUnknown &&
            (d.h === null || d.h === undefined)
        ) {
            return false;
        }

        return (
            nameMatch &&
            typeMatch &&
            subMatch
        );
    });

    sortData();
}

function sortData() {

    filtered.sort((a, b) => {

        let av = a[sortCol];
        let bv = b[sortCol];

        if (sortCol === 'h') {

            av =
                av != null
                ? parseFloat(av)
                : -Infinity;

            bv =
                bv != null
                ? parseFloat(bv)
                : -Infinity;

            return (av - bv) * sortDir;
        }

        av = (av || '').toLowerCase();
        bv = (bv || '').toLowerCase();

        return av < bv
            ? -sortDir
            : av > bv
            ? sortDir
            : 0;
    });

    currentPage = 1;

    renderTable();
}

function renderTable() {

    const total = filtered.length;

    const start =
        (currentPage - 1) * PAGE_SIZE;

    const end =
        Math.min(start + PAGE_SIZE, total);

    const rows =
        filtered.slice(start, end);

    const totalPages =
        Math.ceil(total / PAGE_SIZE) || 1;

    metaText.textContent =
        `${total.toLocaleString()} structures`;

    function arrow(col) {

        return sortCol === col
            ? (sortDir === -1 ? ' ▼' : ' ▲')
            : '';
    }

    function th(col, label) {

        return `
            <th data-col="${col}"
                class="${sortCol===col?'sorted':''}">
                ${label}
                <span class="sort-arrow">
                    ${arrow(col)}
                </span>
            </th>
        `;
    }

    if (total === 0) {

        tableWrap.innerHTML = `
            <div class="state-box">
                No structures match your filters.
            </div>
        `;

        pagination.style.display = 'none';

        return;
    }

    tableWrap.innerHTML = `
        <table>
            <thead>
                <tr>
                    ${th('n','Name')}
                    ${th('t','Type')}
                    ${th('h','Height (m)')}
                    ${th('city','City')}
                    ${th('state','Country')}
                    <th>Coordinates</th>
                    <th>uMap</th>
                </tr>
            </thead>

            <tbody>

                ${rows.map(d => {

                    const lat = d.lat;
                    const lng = d.lng;

                    const umap =
                        lat != null && lng != null
                        ? `https://umap.openstreetmap.fr/en/map/masts-chimneys-turbines-etc-2026_1398843#17/${lat}/${lng}`
                        : null;

                    return `
                        <tr>

                            <td class="name-cell">
                                ${esc(d.n || '—')}
                            </td>

                            <td>
                                <span class="tag">
                                    ${esc(d.t)}
                                </span>
                            </td>

                            <td class="height-cell">
                                ${d.h != null ? d.h : '—'}
                            </td>

                            <td>
                                ${esc(d.city || '—')}
                            </td>

                            <td>
                                ${esc(d.state || '—')}
                            </td>

                            <td class="coord-cell">
                                ${
                                    lat != null && lng != null
                                    ? `${lat}, ${lng}`
                                    : '—'
                                }
                            </td>

                            <td>
                                ${
                                    umap
                                    ? `<a href="${umap}" target="_blank">↗</a>`
                                    : '—'
                                }
                            </td>

                        </tr>
                    `;
                }).join('')}

            </tbody>
        </table>
    `;

    tableWrap.querySelectorAll('th[data-col]')
        .forEach(th => {

            th.addEventListener('click', () => {

                if (sortCol === th.dataset.col) {

                    sortDir *= -1;

                } else {

                    sortCol = th.dataset.col;

                    sortDir =
                        sortCol === 'h'
                        ? -1
                        : 1;
                }

                sortData();
            });
        });

    if (total > PAGE_SIZE) {

        pagination.style.display = 'flex';

        document.getElementById('pg-info')
            .textContent =
            `page ${currentPage} / ${totalPages}`;

        document.getElementById('pg-prev')
            .disabled = currentPage === 1;

        document.getElementById('pg-next')
            .disabled = currentPage === totalPages;

    } else {

        pagination.style.display = 'none';
    }
}

document.getElementById('pg-prev')
.addEventListener('click', () => {

    if (currentPage > 1) {

        currentPage--;

        renderTable();

        tableWrap.scrollTop = 0;
    }
});

document.getElementById('pg-next')
.addEventListener('click', () => {

    if ((currentPage * PAGE_SIZE) < filtered.length) {

        currentPage++;

        renderTable();

        tableWrap.scrollTop = 0;
    }
});

filterInput.addEventListener(
    'input',
    debounce(applyFilters, 250)
);

typeFilter.addEventListener(
    'change',
    applyFilters
);

subregionFilter.addEventListener(
    'change',
    applyFilters
);

hideLinesCheck.addEventListener(
    'change',
    applyFilters
);

hideUnknownCheck.addEventListener(
    'change',
    applyFilters
);

function debounce(fn, ms) {

    let t;

    return (...a) => {

        clearTimeout(t);

        t = setTimeout(() => fn(...a), ms);
    };
}

function esc(s) {

    return String(s || '')
        .replace(/\u00a0/g, ' ')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

</script>
